# book_management.routing.yml
# PURPOSE: This file defines the URL paths for the module.
# It maps human-readable URLs (like /admin/book-management) to specific controllers and permissions.

entity.book_item.collection:
  path: '/admin/book-management'
  defaults:
    _entity_list: 'book_item'
    _title: 'Books'
  requirements:
    _permission: 'administer site configuration'

# Alias for underscored version to ensure no 404s
entity.book_item.collection_alt:
  path: '/admin/book_management'
  defaults:
    _entity_list: 'book_item'
    _title: 'Books'
  requirements:
    _permission: 'administer site configuration'

book_management.settings:
  path: '/admin/config/content/book-management'
  defaults:
    _form: 'Drupal\book_management\Form\SettingsForm'
    _title: 'Book Management Settings'
  requirements:
    _permission: 'administer site configuration'
